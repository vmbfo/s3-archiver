services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    depends_on:
      localstack:
        condition: service_healthy
        required: false
    env_file:
      - ${APP_ENV_FILE:-/dev/null}
    environment:
      APP_ENV_FILE: ${APP_ENV_FILE:-/dev/null}
      ARCHIVER_CONFIG_JSON: |
        [
          {
            "name": "default",
            "parser": "filename_timestamp",
            "copy_mode": "daily_tar_gz",
            "source": {
              "provider": "$${S3_SOURCE_PROVIDER:-localstack}",
              "endpoint_url": "$${S3_SOURCE_ENDPOINT_URL:-http://localstack:4566}",
              "region": "$${S3_SOURCE_REGION:-us-east-1}",
              "bucket": "$${S3_SOURCE_BUCKET:-source-bucket}",
              "path": "$${S3_SOURCE_PATH:-}",
              "access_key_id": "$${S3_SOURCE_ACCESS_KEY_ID:-source-test}",
              "secret_access_key": "$${S3_SOURCE_SECRET_ACCESS_KEY:-source-test}",
              "addressing_style": "$${S3_SOURCE_ADDRESSING_STYLE:-path}"
            },
            "destination": {
              "provider": "$${S3_DESTINATION_PROVIDER:-localstack}",
              "endpoint_url": "$${S3_DESTINATION_ENDPOINT_URL:-http://localstack:4566}",
              "region": "$${S3_DESTINATION_REGION:-us-east-1}",
              "bucket": "$${S3_DESTINATION_BUCKET:-destination-bucket}",
              "path": "$${S3_DESTINATION_PATH:-}",
              "access_key_id": "$${S3_DESTINATION_ACCESS_KEY_ID:-destination-test}",
              "secret_access_key": "$${S3_DESTINATION_SECRET_ACCESS_KEY:-destination-test}",
              "addressing_style": "$${S3_DESTINATION_ADDRESSING_STYLE:-path}"
            }
          }
        ]
      LOG_DIR: /var/log/s3-archiver
    volumes:
      - app_logs:/var/log/s3-archiver

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command: ["schedule"]
    depends_on:
      localstack:
        condition: service_healthy
        required: false
    env_file:
      - ${APP_ENV_FILE:-/dev/null}
    environment:
      APP_ENV_FILE: ${APP_ENV_FILE:-/dev/null}
      ARCHIVER_CONFIG_JSON: |
        [
          {
            "name": "default",
            "parser": "filename_timestamp",
            "copy_mode": "daily_tar_gz",
            "source": {
              "provider": "$${S3_SOURCE_PROVIDER:-localstack}",
              "endpoint_url": "$${S3_SOURCE_ENDPOINT_URL:-http://localstack:4566}",
              "region": "$${S3_SOURCE_REGION:-us-east-1}",
              "bucket": "$${S3_SOURCE_BUCKET:-source-bucket}",
              "path": "$${S3_SOURCE_PATH:-}",
              "access_key_id": "$${S3_SOURCE_ACCESS_KEY_ID:-source-test}",
              "secret_access_key": "$${S3_SOURCE_SECRET_ACCESS_KEY:-source-test}",
              "addressing_style": "$${S3_SOURCE_ADDRESSING_STYLE:-path}"
            },
            "destination": {
              "provider": "$${S3_DESTINATION_PROVIDER:-localstack}",
              "endpoint_url": "$${S3_DESTINATION_ENDPOINT_URL:-http://localstack:4566}",
              "region": "$${S3_DESTINATION_REGION:-us-east-1}",
              "bucket": "$${S3_DESTINATION_BUCKET:-destination-bucket}",
              "path": "$${S3_DESTINATION_PATH:-}",
              "access_key_id": "$${S3_DESTINATION_ACCESS_KEY_ID:-destination-test}",
              "secret_access_key": "$${S3_DESTINATION_SECRET_ACCESS_KEY:-destination-test}",
              "addressing_style": "$${S3_DESTINATION_ADDRESSING_STYLE:-path}"
            }
          }
        ]
      LOG_DIR: /var/log/s3-archiver
    profiles: ["schedule"]
    restart: unless-stopped
    volumes:
      - app_logs:/var/log/s3-archiver

  localstack:
    image: localstack/localstack:4.8.1
    profiles: ["test"]
    environment:
      AWS_DEFAULT_REGION: us-east-1
      SERVICES: s3
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "awslocal s3api list-buckets >/dev/null 2>&1",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "${LOCALSTACK_HOST_PORT:-4566}:4566"
    networks:
      default:
        aliases:
          - localstack-alt
    volumes:
      - ./docker/localstack/init/boot.d:/etc/localstack/init/boot.d:ro
      - ./docker/localstack/init/ready.d:/etc/localstack/init/ready.d:ro
      - ./docker/localstack/test-support:/opt/s3-archiver-test-support:ro

volumes:
  app_logs:
