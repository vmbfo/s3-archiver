services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    depends_on:
      localstack:
        condition: service_healthy
        required: false
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      APP_ENV_FILE: ${APP_ENV_FILE:-.env}
      LOG_DIR: /var/log/s3-archiver
    labels:
      s3-archiver.env.ARCHIVER_CONFIG_JSON: env_file
    volumes:
      - app_logs:/var/log/s3-archiver

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command: ["schedule"]
    depends_on:
      localstack:
        condition: service_healthy
        required: false
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      APP_ENV_FILE: ${APP_ENV_FILE:-.env}
      LOG_DIR: /var/log/s3-archiver
    labels:
      s3-archiver.env.ARCHIVER_CONFIG_JSON: env_file
    restart: unless-stopped
    volumes:
      - app_logs:/var/log/s3-archiver

  localstack:
    image: localstack/localstack:4.8.1
    profiles: ["test"]
    environment:
      AWS_DEFAULT_REGION: us-east-1
      SERVICES: s3
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "awslocal s3api list-buckets >/dev/null 2>&1",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "${LOCALSTACK_HOST_PORT:-4566}:4566"
    networks:
      default:
        aliases:
          - localstack-alt
    volumes:
      - ./docker/localstack/init/boot.d:/etc/localstack/init/boot.d:ro
      - ./docker/localstack/init/ready.d:/etc/localstack/init/ready.d:ro
      - ./docker/localstack/test-support:/opt/s3-archiver-test-support:ro

volumes:
  app_logs:
