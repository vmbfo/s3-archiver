[project]
name = "s3-archiver-cli"
version = "0.1.0"
description = "CLI entrypoint for s3-archiver."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "s3-archiver-core",
  "typer>=0.17.4",
]

[project.scripts]
s3-archiver = "s3_archiver_cli.main:main"

[build-system]
requires = ["uv_build>=0.11.6,<0.12.0"]
build-backend = "uv_build"

[tool.uv]
package = true

[tool.uv.sources]
s3-archiver-core = { workspace = true }
