[project]
name = "s3-archiver-localstack-support"
version = "0.1.0"
description = "Shared LocalStack and Docker Compose support for s3-archiver validation tools."
readme = "README.md"
requires-python = ">=3.12"
dependencies = ["s3-archiver-core"]

[build-system]
requires = ["uv_build>=0.11.6,<0.12.0"]
build-backend = "uv_build"

[tool.uv]
package = true

[tool.uv.sources]
s3-archiver-core = { workspace = true }
